<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#c7ad7f" />
  <link rel="manifest" href="manifest.json" />
  <title>宁笑 NingSmile</title>
  <style>
    :root {
      --bg: #f7f5f1;
      --card: #fcfbf8;
      --text: #2c2926;
      --muted: #8c8377;
      --line: #dcc8a0;
      --button: #b8b4b0;
      --button-active: #9f968b;
      --soft: #f3efe8;
      --accent: #c7ad7f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #e9e7e2 0%, var(--bg) 18%);
      color: var(--text);
      font-family: "PingFang SC", "Noto Serif SC", "Source Han Serif SC", "Hiragino Sans GB", serif;
      min-height: 100vh;
      padding: 18px;
    }

    .phone {
      max-width: 860px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 34px;
      padding: 28px 22px 52px;
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.04);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .circle-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #f3f2ef;
      color: #595550;
      font-size: 24px;
      cursor: pointer;
    }

    .app-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 64px);
      font-weight: 800;
      font-style: italic;
      letter-spacing: 0.06em;
      color: #d68a2f;
      font-family: "Georgia", "Times New Roman", serif;
      text-shadow: 0 1px 0 rgba(255,255,255,0.6);
    }

    .hero .cn {
      margin-top: 10px;
      color: #d0af6d;
      font-size: 24px;
      letter-spacing: 0.42em;
      padding-left: 0.42em;
    }

    .hero-note {
      max-width: 620px;
      margin: 22px auto 0;
      color: #7c7267;
      font-size: 16px;
      line-height: 1.9;
    }

    .gold-line {
      width: 72px;
      height: 1px;
      margin: 26px auto 0;
      background: var(--line);
    }

    .langs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      justify-items: center;
      align-items: center;
      margin: 34px auto 34px;
      max-width: 520px;
      color: #5f584f;
      font-size: 20px;
    }

    .lang-btn {
      position: relative;
      background: transparent;
      border: none;
      color: inherit;
      font: inherit;
      cursor: pointer;
      padding: 0;
    }

    .lang-btn.active { color: var(--text); }

    .lang-btn.active::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: -10px;
      width: 42px;
      height: 2px;
      background: var(--line);
    }

    .profile-card,
    .prompt-card,
    .submission-card,
    .feed-card {
      background: #fffdfa;
      border: 1px solid #eee7dc;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .page-info {
      color: #7a7065;
      font-size: 14px;
    }

    .footer-card {
      background: #fffdfa;
      border: 1px solid #eee7dc;
      border-radius: 18px;
      padding: 18px;
      margin-top: 18px;
    }

    .footer-title {
      font-size: 18px;
      color: #6d6255;
      margin-bottom: 8px;
    }

    .footer-text {
      color: #645b50;
      font-size: 15px;
      line-height: 1.9;
    }

    .footer-link {
      color: #b77722;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link:hover {
      text-decoration: underline;
    }

    .section-title {
      font-size: 18px;
      color: #6d6255;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 94px 1fr;
      gap: 18px;
      align-items: start;
    }

    .avatar-wrap {
      text-align: center;
    }

    .avatar {
      width: 94px;
      height: 94px;
      border-radius: 50%;
      border: 2px solid #eadcc2;
      object-fit: cover;
      background: #f3efe8;
      display: block;
      margin: 0 auto 10px;
    }

    .small-btn,
    .submit,
    .secondary-btn {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
    }

    .small-btn,
    .secondary-btn {
      background: #efe9df;
      color: #5f5548;
    }

    .submit {
      background: var(--button);
      color: white;
      font-size: 20px;
      padding: 18px 26px;
      transition: background 0.2s ease;
    }

    .submit:hover { background: var(--button-active); }

    .field-group {
      margin-bottom: 14px;
    }

    .field-label {
      display: block;
      margin-bottom: 6px;
      color: #7d7266;
      font-size: 14px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      background: #fffdfa;
      padding: 14px 16px;
      color: var(--text);
      font-size: 16px;
      line-height: 1.7;
      outline: none;
      font-family: inherit;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    .readonly-field {
      background: #f7f3ec;
      color: #6e6559;
    }

    .help-text {
      color: #8a7f72;
      font-size: 14px;
      line-height: 1.8;
    }

    .prompt-main {
      font-size: 28px;
      line-height: 1.5;
      margin: 0 0 12px;
      font-weight: 400;
    }

    .prompt-desc {
      color: #7e7367;
      font-size: 15px;
      line-height: 1.9;
    }

    .photo-preview {
      margin-top: 12px;
      max-width: 180px;
      border-radius: 16px;
      display: none;
      border: 1px solid #eadcc2;
    }

    .counter {
      text-align: right;
      margin-top: 10px;
      color: #7f7468;
      font-size: 14px;
    }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #625a50;
      font-size: 18px;
    }

    .feed-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .feed-title {
      font-size: 28px;
      margin: 0;
      font-weight: 400;
    }

    .feed-list {
      display: grid;
      gap: 14px;
    }

    .voice-card {
      background: #fffdfa;
      border: 1px solid #eee7dc;
      border-left: 3px solid var(--line);
      border-radius: 14px;
      padding: 16px;
    }

    .voice-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .voice-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #eadcc2;
      background: #f1ece3;
    }

    .voice-name {
      font-size: 16px;
      font-weight: 600;
      color: #4c453d;
    }

    .voice-time {
      color: #8c8276;
      font-size: 13px;
      margin-top: 2px;
    }

    .voice-prompt {
      color: #b79252;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .voice-text {
      font-size: 17px;
      color: #4b443c;
      line-height: 1.9;
    }

    .voice-photo {
      margin-top: 12px;
      width: 100%;
      max-width: 220px;
      border-radius: 16px;
      border: 1px solid #eadcc2;
    }

    .muted-empty {
      color: #8b8174;
      text-align: center;
      padding: 24px 10px;
      line-height: 1.9;
    }

    @media (max-width: 720px) {
      body { padding: 10px; }
      .phone { padding: 20px 14px 42px; border-radius: 24px; }
      .langs { font-size: 18px; gap: 14px; }
      .profile-grid { grid-template-columns: 1fr; }
      .avatar-wrap { text-align: left; }
      .avatar { margin-left: 0; }
      .prompt-main { font-size: 24px; }
      .feed-title { font-size: 24px; }
      .submit { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="topbar">
      <button class="circle-btn" type="button" id="randomPromptBtn" title="换一题">↻</button>
      <div class="app-title">宁笑 NingSmile</div>
      <button class="circle-btn" type="button" id="scrollFeedBtn" title="查看留言">☺</button>
    </div>

    <section class="hero">
      <h1 id="heroTitle">NingSmile</h1>
      <div class="cn" id="heroSubtitle">宁 笑</div>
      <div class="gold-line"></div>
      <div class="hero-note" id="heroNote">通过真实、自省、善意与微笑，把愿意悔改的人慢慢连接起来。</div>

      <div class="langs" id="languageTabs">
        <button class="lang-btn active" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">English</button>
        <button class="lang-btn" data-lang="ja">日本語</button>
        <button class="lang-btn" data-lang="ko">한국어</button>
      </div>
    </section>

    <section class="profile-card">
      <div class="section-title" id="profileTitle">我的标记</div>
      <div class="profile-grid">
        <div class="avatar-wrap">
          <img id="avatarPreview" class="avatar" alt="avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><rect width='120' height='120' fill='%23f1ece3'/><text x='60' y='68' font-size='42' text-anchor='middle' fill='%23b89f72'>☺</text></svg>" />
          <input id="avatarInput" type="file" accept="image/*" hidden />
          <button class="small-btn" type="button" id="avatarBtn">修改头像</button>
        </div>
        <div>
          <div class="field-group">
            <label class="field-label" id="systemNameLabel" for="systemName">系统唯一名</label>
            <input class="readonly-field" id="systemName" type="text" readonly />
          </div>
          <div class="field-group">
            <label class="field-label" id="customNameLabel" for="customName">自定义名称</label>
            <input id="customName" type="text" maxlength="24" placeholder="例如：青岛微笑者" />
          </div>
          <div class="help-text" id="nameHelp">显示方式：系统唯一名 + 自定义名称。你以后可以继续修改名字和头像。</div>
        </div>
      </div>
    </section>

    <section class="prompt-card">
      <div class="section-title" id="promptTitle">今日自省</div>
      <h2 class="prompt-main" id="promptMain"></h2>
      <div class="prompt-desc" id="promptDesc"></div>
      <div class="action-row">
        <button class="secondary-btn" type="button" id="newPromptBtn">换一个题目</button>
      </div>
    </section>

    <section class="submission-card">
      <div class="section-title" id="submissionTitle">留下今日宁笑</div>
      <div class="field-group">
        <label class="field-label" id="messageLabel" for="entry">留言（必填）</label>
        <textarea id="entry" maxlength="280" placeholder="写下一句真实的话…"></textarea>
        <div class="counter"><span id="count">0</span> / 280</div>
      </div>

      <div class="field-group">
        <label class="field-label" id="photoLabel" for="photoInput">微笑照片（可选）</label>
        <input id="photoInput" type="file" accept="image/*" hidden />
        <button class="secondary-btn" type="button" id="photoBtn">上传微笑照片</button>
        <img id="photoPreview" class="photo-preview" alt="preview" />
      </div>

      <div class="action-row">
        <label class="toggle">
          <input type="checkbox" id="smileCheck" checked />
          <span id="smileToggle">🙂 我愿意用微笑面对他人</span>
        </label>
        <button class="submit" id="saveBtn" type="button">留下宁笑</button>
      </div>
    </section>

    <section class="feed-card" id="feedSection">
      <div class="feed-head">
        <h3 class="feed-title" id="feedTitle">宁笑群体</h3>
        <button class="secondary-btn" type="button" id="clearDemoBtn">清除示例</button>
      </div>
      <div id="feedList" class="feed-list"></div>
      <div class="pagination">
        <button class="secondary-btn" type="button" id="prevPageBtn">上一页</button>
        <div class="page-info" id="pageInfo">第 1 页</div>
        <button class="secondary-btn" type="button" id="nextPageBtn">下一页</button>
      </div>
    </section>

    <section class="footer-card">
      <div class="footer-title" id="footerTitle">出品人：HuSir</div>
      <div class="footer-text" id="footerText">
        反省与悔改，不只是为过去自责，而是在真实中看见自己，在恩典中重新开始。
        <a class="footer-link" id="footerLink" href="https://www.husir.org/" target="_blank" rel="noopener noreferrer">进入 HuSir.org 继续阅读</a>
      </div>
    </section>
  </main>

      ],

        {
          title: '오늘 어려운 사람을 어떤 친절로 대할 수 있을까요?',
          desc: '닝스마일은 무조건 참는 것이 아니라, 양심을 지키며 평화와 선의로 사람을 대하는 것입니다.'

    const defaultAvatar = document.getElementById('avatarPreview').src;
    const state = {
      lang: 'zh',
      promptIndex: 0,
      currentPage: 1,
      postsPerPage: 50,
      profile: {
        systemName: '',
        customName: '',
        avatar: defaultAvatar
      },
      draftPhoto: '',
      posts: []
    };

    const STORAGE_KEY = 'ningxiao-pwa-v1';
    const entryInput = document.getElementById('entry');
    const count = document.getElementById('count');
    const avatarPreview = document.getElementById('avatarPreview');
    const avatarInput = document.getElementById('avatarInput');
    const customName = document.getElementById('customName');
    const systemName = document.getElementById('systemName');
    const photoInput = document.getElementById('photoInput');
    const photoPreview = document.getElementById('photoPreview');
    const feedList = document.getElementById('feedList');

    function generateSystemName() {
      const seed = Date.now().toString(36).slice(-4) + Math.random().toString(36).slice(2, 6);
      return 'NS-' + seed.toUpperCase();
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        Object.assign(state, parsed);
      }
      if (!state.profile.systemName) {
        state.profile.systemName = generateSystemName();
      }
      if (!state.profile.avatar) {
        state.profile.avatar = defaultAvatar;
      }
      if (!Array.isArray(state.posts)) {
        state.posts = [];
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function applyLanguage(lang) {
      state.lang = lang;
      const t = uiText[lang];
      document.documentElement.lang = lang;
      document.getElementById('heroTitle').textContent = t.heroTitle;
      document.getElementById('heroSubtitle').textContent = t.heroSubtitle;
      document.getElementById('heroNote').textContent = t.heroNote;
      document.getElementById('profileTitle').textContent = t.profileTitle;
      document.getElementById('systemNameLabel').textContent = t.systemNameLabel;
      document.getElementById('customNameLabel').textContent = t.customNameLabel;
      document.getElementById('nameHelp').textContent = t.nameHelp;
      document.getElementById('avatarBtn').textContent = t.avatarBtn;
      document.getElementById('promptTitle').textContent = t.promptTitle;
      document.getElementById('newPromptBtn').textContent = t.newPromptBtn;
      document.getElementById('submissionTitle').textContent = t.submissionTitle;
      document.getElementById('messageLabel').textContent = t.messageLabel;
      document.getElementById('photoLabel').textContent = t.photoLabel;
      document.getElementById('photoBtn').textContent = t.photoBtn;
      document.getElementById('smileToggle').textContent = t.smileToggle;
      document.getElementById('saveBtn').textContent = t.saveBtn;
      document.getElementById('feedTitle').textContent = t.feedTitle;
      document.getElementById('clearDemoBtn').textContent = t.clearDemoBtn;
      document.getElementById('prevPageBtn').textContent = t.prevPageBtn;
      document.getElementById('nextPageBtn').textContent = t.nextPageBtn;
      document.getElementById('footerTitle').textContent = t.footerTitle;
      document.getElementById('footerText').childNodes[0].textContent = t.footerText + ' ';
      document.getElementById('footerLink').textContent = t.footerLink;
      customName.placeholder = t.customPlaceholder;
      entryInput.placeholder = t.messagePlaceholder;

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      renderPrompt();
      renderPosts();
      saveState();
    }

    function randomizePrompt() {
      const list = prompts[state.lang];
      const next = Math.floor(Math.random() * list.length);
      state.promptIndex = next;
      renderPrompt();
      saveState();
    }

    function renderPrompt() {
      const t = uiText[state.lang];
      const list = prompts[state.lang];
      if (state.promptIndex >= list.length) state.promptIndex = 0;
      const item = list[state.promptIndex];
      document.getElementById('promptMain').textContent = item.title;
      document.getElementById('promptDesc').textContent = t.promptDescPrefix + item.desc;
    }

    function getDisplayName(post) {
      return post.customName ? `${post.systemName} + ${post.customName}` : post.systemName;
    }

    function timeLabel() {
      return uiText[state.lang].timeJustNow;
    }

    function renderPosts() {
      feedList.innerHTML = '';
      if (state.posts.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'muted-empty';
        empty.textContent = uiText[state.lang].emptyFeed;
        feedList.appendChild(empty);
        updatePagination();
        return;
      }

      const start = (state.currentPage - 1) * state.postsPerPage;
      const end = start + state.postsPerPage;
      const visiblePosts = state.posts.slice(start, end);

      visiblePosts.forEach(post => {
        const card = document.createElement('div');
        card.className = 'voice-card';

        const head = document.createElement('div');
        head.className = 'voice-head';

        const avatar = document.createElement('img');
        avatar.className = 'voice-avatar';
        avatar.src = post.avatar || defaultAvatar;
        avatar.alt = 'avatar';

        const info = document.createElement('div');
        const name = document.createElement('div');
        name.className = 'voice-name';
        name.textContent = getDisplayName(post);
        const time = document.createElement('div');
        time.className = 'voice-time';
        time.textContent = post.createdAtText || timeLabel();
        info.appendChild(name);
        info.appendChild(time);

        head.appendChild(avatar);
        head.appendChild(info);
        card.appendChild(head);

        const prompt = document.createElement('div');
        prompt.className = 'voice-prompt';
        prompt.textContent = post.promptTitle;
        card.appendChild(prompt);

        const text = document.createElement('div');
        text.className = 'voice-text';
        text.textContent = post.message;
        card.appendChild(text);

        if (post.photo) {
          const photo = document.createElement('img');
          photo.className = 'voice-photo';
          photo.src = post.photo;
          photo.alt = 'smile photo';
          card.appendChild(photo);
        }

        feedList.appendChild(card);
      });

      updatePagination();
    }

    function updatePagination() {
      const totalPages = Math.max(1, Math.ceil(state.posts.length / state.postsPerPage));
      if (state.currentPage > totalPages) state.currentPage = totalPages;
      const text = uiText[state.lang].pageInfo
        .replace('{page}', state.currentPage)
        .replace('{total}', totalPages);
      document.getElementById('pageInfo').textContent = text;
      document.getElementById('prevPageBtn').disabled = state.currentPage <= 1;
      document.getElementById('nextPageBtn').disabled = state.currentPage >= totalPages;
    }

    function updateCount() {
      count.textContent = entryInput.value.length;
    }

    function readImage(file, callback) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => callback(reader.result);
      reader.readAsDataURL(file);
    }

    function setDraftPhoto(dataUrl) {
      state.draftPhoto = dataUrl || '';
      if (state.draftPhoto) {
        photoPreview.src = state.draftPhoto;
        photoPreview.style.display = 'block';
      } else {
        photoPreview.src = '';
        photoPreview.style.display = 'none';
      }
    }

    function submitPost() {
      const text = entryInput.value.trim();
      if (!text) {
        alert(uiText[state.lang].emptyMessage);
        return;
      }

      const promptItem = prompts[state.lang][state.promptIndex];
      state.posts.unshift({
        systemName: state.profile.systemName,
        customName: state.profile.customName,
        avatar: state.profile.avatar,
        message: text,
        photo: state.draftPhoto,
        promptTitle: promptItem.title,
        createdAt: Date.now(),
        createdAtText: timeLabel(),
        lang: state.lang
      });

      state.currentPage = 1;
      entryInput.value = '';
      updateCount();
      setDraftPhoto('');
      renderPosts();
      saveState();
    }

    function clearDemo() {
      state.posts = [];
      renderPosts();
      saveState();
    }

    function seedDemoPosts() {
      if (state.posts.length > 0) return;
      state.posts = [
        {
          systemName: 'NS-A1F9',
          customName: '平静海风',
          avatar: defaultAvatar,
          message: '今天我意识到自己把疲惫变成了对家人的不耐烦，承认之后，心里反而安静了。',
          photo: '',
          promptTitle: '今天，你在哪一种情绪里看见了自己？',
          createdAt: Date.now(),
          createdAtText: '刚刚',
          lang: 'zh'
        },
        {
          systemName: 'NS-C7K2',
          customName: 'Quiet Smiler',
          avatar: defaultAvatar,
          message: 'I stopped defending myself for a moment and chose to listen first.',
          photo: '',
          promptTitle: 'Whom did you stop blaming and begin to understand today?',
          createdAt: Date.now(),
          createdAtText: 'just now',
          lang: 'en'
        }
      ];
    }

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {
          console.warn(uiText[state.lang].installFail);
        });
      }
    }

    loadState();
    seedDemoPosts();

    systemName.value = state.profile.systemName;
    customName.value = state.profile.customName || '';
    avatarPreview.src = state.profile.avatar || defaultAvatar;
    setDraftPhoto(state.draftPhoto || '');

    applyLanguage(state.lang || 'zh');
    updateCount();

    document.getElementById('languageTabs').addEventListener('click', (event) => {
      const btn = event.target.closest('.lang-btn');
      if (!btn) return;
      applyLanguage(btn.dataset.lang);
    });

    document.getElementById('newPromptBtn').addEventListener('click', randomizePrompt);
    document.getElementById('randomPromptBtn').addEventListener('click', randomizePrompt);
    document.getElementById('scrollFeedBtn').addEventListener('click', () => {
      document.getElementById('feedSection').scrollIntoView({ behavior: 'smooth' });
    });

    document.getElementById('avatarBtn').addEventListener('click', () => avatarInput.click());
    avatarInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      readImage(file, (dataUrl) => {
        state.profile.avatar = dataUrl;
        avatarPreview.src = dataUrl;
        saveState();
      });
    });

    customName.addEventListener('input', () => {
      state.profile.customName = customName.value.trim();
      saveState();
    });

    document.getElementById('photoBtn').addEventListener('click', () => photoInput.click());
    photoInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      readImage(file, setDraftPhoto);
    });

    entryInput.addEventListener('input', updateCount);
    document.getElementById('saveBtn').addEventListener('click', submitPost);
    document.getElementById('prevPageBtn').addEventListener('click', () => {
      if (state.currentPage > 1) {
        state.currentPage -= 1;
        renderPosts();
        saveState();
      }
    });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
      const totalPages = Math.max(1, Math.ceil(state.posts.length / state.postsPerPage));
      if (state.currentPage < totalPages) {
        state.currentPage += 1;
        renderPosts();
        saveState();
      }
    });
    document.getElementById('clearDemoBtn').addEventListener('click', clearDemo);

    registerServiceWorker();
    renderPosts();
  </script>
</body>
</html>
